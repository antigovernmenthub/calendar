<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Complete Calendar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="calendar.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#05060a">
</head>
<body>
  <div class="app">
    <div class="shell">
      <header class="header">
        <div class="title-block">
          <div class="title-row">
            <div class="app-dot"></div>
            <h1>Complete Calendar</h1>
          </div>
          <span class="subtitle">
            See your planner tasks laid out on a monthly calendar.
          </span>
        </div>

        <div class="header-right">
          <button id="themeToggle" class="theme-toggle" type="button">
            <span id="themeIcon">☾</span>
            <span id="themeLabel">Dark</span>
          </button>
          <span id="userLabel" class="user-label"></span>
          <button id="authBtn" class="auth-btn" type="button">Sign in</button>
        </div>
      </header>

      <main class="main-layout">
        <section class="calendar-panel">
          <div class="calendar-header">
            <button id="prevMonth" class="nav-btn" type="button">‹</button>
            <div class="month-label">
              <span id="monthName"></span>
              <span id="yearNumber"></span>
            </div>
            <button id="nextMonth" class="nav-btn" type="button">›</button>
          </div>

          <div class="weekday-row">
            <span>Sun</span>
            <span>Mon</span>
            <span>Tue</span>
            <span>Wed</span>
            <span>Thu</span>
            <span>Fri</span>
            <span>Sat</span>
          </div>

          <div id="calendarGrid" class="calendar-grid"></div>
        </section>

        <aside class="side-panel">
          <div class="side-card">
            <div class="side-header">
              <span class="side-title">Selected day</span>
              <span class="side-date" id="selectedDateLabel">Select a day</span>
            </div>
            <p class="side-count"><span id="selectedCount">0</span> tasks</p>
            <ul id="selectedList" class="task-list"></ul>
            <p class="side-empty" id="selectedEmpty">No tasks for this day.</p>
          </div>

          <div class="side-card">
            <div class="side-header">
              <span class="side-title">From your planner</span>
            </div>
            <p class="side-note">
              This calendar reads tasks from your Complete planner (same device, same browser).
            </p>
          </div>
        </aside>
      </main>
    </div>
  </div>

  <script src="calendar.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js").catch((err) => {
        console.error("Service worker registration failed", err);
      });
    }
  </script>

  <!-- Firebase Auth for Google sign-in -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getAuth,
      onAuthStateChanged,
      GoogleAuthProvider,
      signInWithPopup,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB2n9yF-y2tx9CPalnFVVP1esgQmXqf9Hw",
      authDomain: "complete-575d8.firebaseapp.com",
      projectId: "complete-575d8",
      storageBucket: "complete-575d8.firebasestorage.app",
      messagingSenderId: "386287269951",
      appId: "1:386287269951:web:fe62fed163c0735aa3a08a",
      measurementId: "G-KBDDB2953K"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const userLabel = document.getElementById("userLabel");
    const authBtn = document.getElementById("authBtn");

    onAuthStateChanged(auth, (user) => {
      if (!userLabel || !authBtn) return;
      if (user) {
        userLabel.textContent = user.displayName || user.email || "Signed in";
        authBtn.textContent = "Sign out";
      } else {
        userLabel.textContent = "Not signed in";
        authBtn.textContent = "Sign in";
      }
    });

    authBtn?.addEventListener("click", async () => {
      const user = auth.currentUser;
      if (!user) {
        try {
          await signInWithPopup(auth, provider);
        } catch (err) {
          console.error("Sign-in failed", err);
        }
      } else {
        try {
          await signOut(auth);
        } catch (err) {
          console.error("Sign-out failed", err);
        }
      }
    });
  </script>
</body>
</html>
